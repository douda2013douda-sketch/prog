<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إدارة الموظفين</title>

<style>

body{
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: #ffffff;
color: #333;
padding: 40px;
min-height: 100vh;
margin: 0;
}

h1{
text-align: center;
margin-bottom: 30px;
color: #2c3e50;
text-shadow: none;
font-size: 2.5em;
}

input, select{
padding: 12px;
margin: 8px;
border: 2px solid #ddd;
border-radius: 8px;
font-size: 16px;
transition: border-color 0.3s;
}

input:focus, select:focus{
border-color: #667eea;
outline: none;
box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
}

button{
padding: 12px 20px;
border: none;
border-radius: 8px;
cursor: pointer;
font-size: 16px;
font-weight: bold;
transition: all 0.3s;
box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

button:hover{
transform: translateY(-2px);
box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

.add{
background: linear-gradient(45deg, #2ecc71, #27ae60);
color: white;
margin-bottom: 20px;
}

.edit{
background: linear-gradient(45deg, #f39c12, #e67e22);
color: white;
}

.delete{
background: linear-gradient(45deg, #e74c3c, #c0392b);
color: white;
}

button:hover{
transform: translateY(-2px);
box-shadow: 0 6px 12px rgba(0,0,0,0.2);
}

input:focus, select:focus{
border-color: #667eea;
outline: none;
box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
}

table{
width: 100%;
border-collapse: collapse;
background: white;
border-radius: 10px;
overflow: hidden;
box-shadow: 0 8px 16px rgba(0,0,0,0.1);
}

th, td{
padding: 15px;
text-align: center;
border-bottom: 1px solid #ddd;
}

th{
background: linear-gradient(45deg, #2c3e50, #34495e);
color: white;
font-weight: bold;
text-transform: uppercase;
letter-spacing: 1px;
}

tr:hover{
background: #f5f5f5;
}

tr:hover{
background: #f5f5f5;
}

#searchInput{
width: 100%;
padding: 15px;
margin-bottom: 25px;
border: 2px solid #ddd;
border-radius: 8px;
font-size: 18px;
box-sizing: border-box;
}

#formContainer{
display: none;
background: white;
padding: 30px;
border-radius: 15px;
margin-bottom: 25px;
box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<h1>إدارة الموظفين</h1>

{% if message %}
<div class="message">{{ message }}</div>
{% endif %}

<input type="text" id="searchInput" placeholder="ابحث عن موظف...">

<button class="add" onclick="showAddForm()">إضافة موظف</button>

<div id="formContainer">
<form id="employeeForm" method="POST">
<input type="hidden" name="action" id="formAction" value="add">
<input type="hidden" name="number" id="editNumber">

<label>الرقم التعريفي: <input type="text" name="national_id_input" id="nationalIdInput" required></label><br>
<label>رقم الملف: <input type="text" name="num_file" required></label><br>
<label>الاسم الأول: <input type="text" name="first_name" required></label><br>
<label>اللقب: <input type="text" name="last_name" required></label><br>
<label>الاتجاه: <input type="text" name="direction" required></label><br>
<label>الوظيفة: <input type="text" name="job" required></label><br>
<label>الصفة: <input type="text" name="title" required></label><br>
<label>القسم: <input type="text" name="department" required></label><br>

<button class="save" type="submit">حفظ</button>
<button type="button" onclick="hideForm()">إلغاء</button>
</form>
</div>

<table id="employeesTable">

<tr>
<th>الرقم التعريفي</th>
<th>رقم الملف</th>
<th>الاسم</th>
<th>اللقب</th>
<th>الاتجاه</th>
<th>الوظيفة</th>
<th>الصفة</th>
<th>القسم</th>
<th>تعديل</th>
<th>حذف</th>
</tr>

{% for emp in employees %}

<tr class="employeeRow">

<td>{{ emp[0] }}</td>
<td>{{ emp[2] }}</td>
<td>{{ emp[3] }}</td>
<td>{{ emp[4] }}</td>
<td>{{ emp[5] }}</td>
<td>{{ emp[6] }}</td>
<td>{{ emp[7] }}</td>
<td>{{ emp[8] }}</td>

<td>
	<button class="edit" onclick="editEmployee('{{ emp[1] }}', '{{ emp[0] }}', '{{ emp[2] }}', '{{ emp[3] }}', '{{ emp[4] }}', '{{ emp[5] }}', '{{ emp[6] }}', '{{ emp[7] }}', '{{ emp[8] }}')">تعديل</button>
</td>

<td>
<form method="POST" style="display:inline;">
<input type="hidden" name="action" value="delete">
<input type="hidden" name="national_id" value="{{ emp[0] }}">
<button class="delete" type="submit" onclick="return confirm('هل أنت متأكد من الحذف؟')">حذف</button>
</form>
</td>

</tr>

{% endfor %}

</table>

<script>
document.getElementById('searchInput').addEventListener('keyup', function() {
    var filter = this.value.toLowerCase();
    var rows = document.querySelectorAll('.employeeRow');
    rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        if (text.includes(filter)) {
            row.style.display = '';
        } else {
            row.style.display = 'none';
        }
    });
});

function showAddForm() {
    document.getElementById('formAction').value = 'add';
    document.getElementById('editNumber').value = '';
    document.getElementById('nationalIdInput').value = '';
    document.getElementById('employeeForm').reset();
    document.getElementById('formContainer').style.display = 'block';
}

function editEmployee(number, nationalId, numFile, firstName, lastName, direction, job, title, department) {
    document.getElementById('formAction').value = 'edit';
    document.getElementById('editNumber').value = number;
    document.getElementById('nationalIdInput').value = nationalId;
    document.getElementById('nationalIdInput').disabled = false;
    document.getElementById('employeeForm').elements['num_file'].value = numFile;
    document.getElementById('employeeForm').elements['first_name'].value = firstName;
    document.getElementById('employeeForm').elements['last_name'].value = lastName;
    document.getElementById('employeeForm').elements['direction'].value = direction;
    document.getElementById('employeeForm').elements['job'].value = job;
    document.getElementById('employeeForm').elements['title'].value = title;
    document.getElementById('employeeForm').elements['department'].value = department;
    document.getElementById('formContainer').style.display = 'block';
}

function hideForm() {
    document.getElementById('formContainer').style.display = 'none';
}
</script>

</body>
</html>
