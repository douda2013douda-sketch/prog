<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>إدارة الموظفين</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
padding:40px;
}

h1{
text-align:center;
margin-bottom:30px;
}

input, select{
padding:8px;
margin:5px;
}

button{
padding:6px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{
background:#2ecc71;
color:white;
margin-bottom:15px;
}

.edit{
background:#f39c12;
color:white;
}

.delete{
background:#e74c3c;
color:white;
}

.save{
background:#3498db;
color:white;
margin-top:15px;
}

.message{
color:green;
margin-bottom:10px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th, td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#3498db;
color:white;
}

#searchInput{
width:100%;
padding:10px;
margin-bottom:20px;
}

#formContainer{
display:none;
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

</style>

</head>

<body>

<h1>إدارة الموظفين</h1>

{% if message %}
<div class="message">{{ message }}</div>
{% endif %}

<input type="text" id="searchInput" placeholder="ابحث عن موظف...">

<button class="add" onclick="showAddForm()">إضافة موظف</button>

<div id="formContainer">
<form id="employeeForm" method="POST">
<input type="hidden" name="action" id="formAction" value="add">
<input type="hidden" name="number" id="editNumber">

<label>الرقم التعريفي: <input type="text" name="national_id_input" id="nationalIdInput" required></label><br>
<label>رقم الملف: <input type="text" name="num_file" required></label><br>
<label>الاسم الأول: <input type="text" name="first_name" required></label><br>
<label>اللقب: <input type="text" name="last_name" required></label><br>
<label>الاتجاه: <input type="text" name="direction" required></label><br>
<label>الوظيفة: <input type="text" name="job" required></label><br>
<label>الصفة: <input type="text" name="title" required></label><br>
<label>القسم: <input type="text" name="department" required></label><br>

<button class="save" type="submit">حفظ</button>
<button type="button" onclick="hideForm()">إلغاء</button>
</form>
</div>

<table id="employeesTable">

<tr>
<th>الرقم التعريفي</th>
<th>رقم الملف</th>
<th>الاسم</th>
<th>اللقب</th>
<th>الاتجاه</th>
<th>الوظيفة</th>
<th>الصفة</th>
<th>القسم</th>
<th>تعديل</th>
<th>حذف</th>
</tr>

{% for emp in employees %}

<tr class="employeeRow">

<td>{{ emp[0] }}</td>
<td>{{ emp[2] }}</td>
<td>{{ emp[3] }}</td>
<td>{{ emp[4] }}</td>
<td>{{ emp[5] }}</td>
<td>{{ emp[6] }}</td>
<td>{{ emp[7] }}</td>
<td>{{ emp[8] }}</td>

<td>
<button class="edit" onclick="editEmployee('{{ emp[0] }}', '{{ emp[1] }}', '{{ emp[2] }}', '{{ emp[3] }}', '{{ emp[4] }}', '{{ emp[5] }}', '{{ emp[6] }}', '{{ emp[7] }}', '{{ emp[8] }}')">تعديل</button>
</td>

<td>
<form method="POST" style="display:inline;">
<input type="hidden" name="action" value="delete">
<input type="hidden" name="national_id" value="{{ emp[0] }}">
<button class="delete" type="submit" onclick="return confirm('هل أنت متأكد من الحذف؟')">حذف</button>
</form>
</td>

</tr>

{% endfor %}

</table>

<script>
document.getElementById('searchInput').addEventListener('keyup', function() {
    var filter = this.value.toLowerCase();
    var rows = document.querySelectorAll('.employeeRow');
    rows.forEach(function(row) {
        var text = row.textContent.toLowerCase();
        if (text.includes(filter)) {
            row.style.display = '';
        } else {
            row.style.display = 'none';
        }
    });
});

function showAddForm() {
    document.getElementById('formAction').value = 'add';
    document.getElementById('editNumber').value = '';
    document.getElementById('nationalIdInput').value = '';
    document.getElementById('employeeForm').reset();
    document.getElementById('formContainer').style.display = 'block';
}

function editEmployee(number, nationalId, numFile, firstName, lastName, direction, job, title, department) {
    document.getElementById('formAction').value = 'edit';
    document.getElementById('editNumber').value = number;
    document.getElementById('nationalIdInput').value = nationalId;
    document.getElementById('nationalIdInput').disabled = false;
    document.getElementById('employeeForm').elements['num_file'].value = numFile;
    document.getElementById('employeeForm').elements['first_name'].value = firstName;
    document.getElementById('employeeForm').elements['last_name'].value = lastName;
    document.getElementById('employeeForm').elements['direction'].value = direction;
    document.getElementById('employeeForm').elements['job'].value = job;
    document.getElementById('employeeForm').elements['title'].value = title;
    document.getElementById('employeeForm').elements['department'].value = department;
    document.getElementById('formContainer').style.display = 'block';
}

function hideForm() {
    document.getElementById('formContainer').style.display = 'none';
}
</script>

</body>
</html>
