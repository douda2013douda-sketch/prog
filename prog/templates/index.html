<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<title>نظام إدارة الإجازات</title>

<style>

body{
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: #333;
text-align: center;
padding-top: 100px;
min-height: 100vh;
margin: 0;
}

h1{
margin-bottom: 40px;
color: white;
text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
font-size: 3em;
}

.container{
display: flex;
justify-content: center;
gap: 40px;
flex-wrap: wrap;
}

.button{
background: linear-gradient(45deg, #3498db, #2980b9);
color: white;
padding: 20px 40px;
font-size: 20px;
border-radius: 15px;
text-decoration: none;
transition: all 0.3s;
box-shadow: 0 8px 16px rgba(0,0,0,0.2);
}

.button:hover{
background: linear-gradient(45deg, #2980b9, #1f4e79);
transform: translateY(-5px);
box-shadow: 0 12px 24px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<h1>نظام إدارة الإجازات</h1>

<div class="container">

<a class="button" href="/employees">
عرض الموظفين
</a>

<a class="button" href="/leave">
تحرير إجازة
</a>

</div>

</body>

</html>
